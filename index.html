<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suite de Análisis Industrial</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; }
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; }
        
        .cover {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(135deg, #000 0%, #0a0a0a 50%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        .cover.hidden { opacity: 0; visibility: hidden; }
        
        .cover-content { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 2rem; }
        .cover-3d-icon { width: 200px; height: 200px; perspective: 1000px; margin: 0 auto; }
        
        .gear {
            width: 100%; height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: rotateCube 8s infinite linear;
        }
        
        .gear-face {
            position: absolute; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            border: 3px solid #ff8c00;
            font-size: 80px;
            font-weight: 900;
            transform-style: preserve-3d;
            background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
            box-shadow: inset 0 0 30px rgba(255, 140, 0, 0.3), 0 0 30px rgba(255, 140, 0, 0.5);
        }
        
        .gear-face:nth-child(1) { transform: translateZ(100px); }
        .gear-face:nth-child(2) { transform: rotateY(180deg) translateZ(100px); }
        .gear-face:nth-child(3) { transform: rotateY(90deg) translateZ(100px); }
        .gear-face:nth-child(4) { transform: rotateY(-90deg) translateZ(100px); }
        .gear-face:nth-child(5) { transform: rotateX(90deg) translateZ(100px); }
        .gear-face:nth-child(6) { transform: rotateX(-90deg) translateZ(100px); }
        
        @keyframes rotateCube {
            0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg); }
        }
        
        .cover-title {
            font-size: 3.5rem; font-weight: 900; text-transform: uppercase;
            letter-spacing: 0.15em; color: #fff;
            text-shadow: 0 0 30px rgba(255, 140, 0, 0.5);
            line-height: 1.1;
            margin: 1rem 0;
        }
        
        .cover-subtitle { font-size: 1rem; color: #ff8c00; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1rem; }
        .cover-description { font-size: 0.9rem; color: #a1a1aa; max-width: 500px; line-height: 1.6; margin-bottom: 2rem; }
        
        .cover-btn {
            background: linear-gradient(135deg, #ff8c00 0%, #ff7f00 100%);
            color: #000; padding: 1rem 3rem; font-size: 1rem;
            font-weight: bold; text-transform: uppercase; letter-spacing: 0.1em;
            border: 2px solid #ff8c00; border-radius: 0.5rem;
            cursor: pointer; transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.3);
        }
        
        .cover-btn:hover {
            background: linear-gradient(135deg, #ff7f00 0%, #ff8c00 100%);
            box-shadow: 0 0 40px rgba(255, 140, 0, 0.6);
            transform: scale(1.05);
        }
        
        .container { display: flex; height: 100vh; width: 100vw; flex-direction: column; }
        .header {
            position: sticky; top: 0; z-index: 50; background: linear-gradient(to right, #000, #18181b, #000);
            border-bottom: 4px solid #ff8c00; padding: 1rem; display: flex; align-items: center; gap: 1rem;
        }
        .header-icon {
            width: 3rem; height: 3rem; background: linear-gradient(135deg, #ff8c00, #ff7f00);
            display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.125rem; border: 2px solid #ff8c00;
        }
        .header-title { font-weight: 900; font-size: 1.25rem; text-transform: uppercase; letter-spacing: 0.1em; }
        .header-subtitle { font-size: 0.75rem; color: #ff8c00; }
        .main-content { display: flex; flex: 1; overflow: hidden; }
        .sidebar {
            width: 20rem; background: linear-gradient(to bottom, #09090b, #000); border-right: 2px solid #ff8c00;
            padding: 1rem; overflow-y: auto;
        }
        .sidebar-title { font-size: 0.75rem; color: #ff8c00; text-transform: uppercase; font-weight: bold; letter-spacing: 0.1em; margin-bottom: 1.5rem; }
        .step-btn {
            width: 100%; padding: 0.75rem; border-radius: 0.375rem; text-align: left; transition: all 0.2s;
            font-size: 0.75rem; font-family: 'Courier New', monospace; border: 2px solid; margin-bottom: 0.5rem;
            cursor: pointer; background: transparent; color: inherit;
        }
        .step-btn.active { background: #ff8c00; color: #000; border-color: #ff8c00; }
        .step-btn.inactive { color: #a1a1aa; border-color: #27272a; }
        .step-btn.inactive:hover { border-color: #ff8c00; }
        .step-number { color: #ff8c00; }
        .content-area { flex: 1; padding: 2rem; background: #000; overflow-y: auto; }
        .content-wrapper { max-width: 80rem; }
        .step-header { margin-bottom: 2.5rem; padding-bottom: 2rem; border-bottom: 2px solid #ff8c00; }
        .step-badge { background: #ff8c00; color: #000; padding: 0.5rem 1rem; border-radius: 0.375rem; font-weight: bold; font-size: 0.75rem; letter-spacing: 0.1em; margin-bottom: 1rem; display: inline-block; }
        .step-title { font-size: 2.25rem; font-weight: 900; text-transform: uppercase; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
        .step-subtitle { font-size: 0.875rem; color: #ff8c00; margin-bottom: 1.5rem; font-style: italic; }
        .step-line { height: 0.5rem; background: linear-gradient(to right, #ff8c00, #ff7f00); width: 8rem; margin-bottom: 1rem; }
        .form-container { background: #18181b; border: 2px solid #27272a; border-radius: 0.5rem; padding: 2rem; margin-bottom: 2.5rem; }
        .form-group { margin-bottom: 2rem; }
        .form-label { display: block; font-size: 0.875rem; font-weight: bold; color: #ff8c00; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.1em; }
        .form-hint { display: block; font-size: 0.7rem; color: #a1a1aa; margin-bottom: 0.75rem; font-style: italic; }
        .form-textarea { width: 100%; padding: 1rem; background: #27272a; border: 2px solid #3f3f46; border-radius: 0.375rem; color: #fff; font-family: 'Courier New', monospace; font-size: 0.875rem; resize: vertical; }
        .form-textarea:focus { outline: none; border-color: #ff8c00; }
        .button-group { display: flex; justify-content: space-between; gap: 1rem; }
        .btn { padding: 0.75rem 1.5rem; border-radius: 0.375rem; font-weight: bold; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.75rem; cursor: pointer; border: 2px solid; transition: all 0.2s; font-family: 'Courier New', monospace; }
        .btn-primary { background: #ff8c00; color: #000; border-color: #ff8c00; }
        .btn-primary:hover:not(:disabled) { background: #ff7f00; border-color: #ff7f00; }
        .btn-secondary { border-color: #3f3f46; color: #a1a1aa; }
        .btn-secondary:hover:not(:disabled) { border-color: #ff8c00; color: #ff8c00; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        
        .summary-section { background: #1a1a1f; border: 2px solid #27272a; border-radius: 0.5rem; padding: 1.5rem; margin-bottom: 1.5rem; }
        .summary-section-title { font-size: 0.875rem; font-weight: bold; color: #ff8c00; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .summary-section-title::before { content: '▌'; font-size: 1.25rem; }
        .summary-content { font-size: 0.8rem; color: #cbd5e1; line-height: 1.7; }
        .summary-content strong { color: #ff8c00; display: block; margin-top: 0.75rem; }
        
        .strategic-reading { background: #2d1f10; border: 2px solid #ff8c00; border-radius: 0.5rem; padding: 1.5rem; margin-bottom: 1.5rem; }
        .strategic-reading-title { font-size: 0.875rem; font-weight: bold; color: #ff8c00; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem; }
        .strategic-reading-content { font-size: 0.8rem; color: #fed7aa; line-height: 1.8; }
        
        .first-movement { background: #1a3a2a; border: 2px solid #059669; border-radius: 0.5rem; padding: 1.5rem; margin-bottom: 1.5rem; }
        .first-movement-title { font-size: 0.875rem; font-weight: bold; color: #10b981; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem; }
        .first-movement-content { font-size: 0.8rem; color: #a7f3d0; line-height: 1.8; }
        .first-movement-content strong { color: #10b981; display: block; margin-top: 0.75rem; }
        
        .risk-warning { background: #3a1a1a; border: 2px solid #dc2626; border-radius: 0.5rem; padding: 1.5rem; margin-bottom: 1.5rem; }
        .risk-warning-title { font-size: 0.875rem; font-weight: bold; color: #f87171; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem; }
        .risk-warning-content { font-size: 0.8rem; color: #fecaca; line-height: 1.8; }
        
        .ai-amplifier-box { background: linear-gradient(135deg, #1a3a2a 0%, #0f2818 100%); border: 2px solid #059669; border-radius: 0.5rem; padding: 1.5rem; margin-top: 2rem; }
        .ai-amplifier-box strong { color: #10b981; display: block; margin-bottom: 0.75rem; }
        .ai-amplifier-box p { font-size: 0.75rem; color: #a7f3d0; line-height: 1.6; margin-bottom: 1rem; }
        
        /* 3D CARDS */
        .report-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
        .report-card {
            background: linear-gradient(135deg, #1a1a1f 0%, #27272a 100%);
            border: 2px solid #ff8c00;
            border-radius: 0.75rem;
            padding: 1.5rem;
            transform: perspective(1000px) rotateY(0deg);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }
        .report-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,140,0,0.2), transparent);
            transition: left 0.6s ease;
        }
        .report-card:hover::before { left: 100%; }
        .report-card:hover {
            transform: perspective(1000px) rotateY(-5deg) translateY(-5px);
            box-shadow: 0 20px 40px rgba(255,140,0,0.3);
        }
        .report-card-title { color: #ff8c00; font-weight: bold; font-size: 0.9rem; margin-bottom: 1rem; text-transform: uppercase; }
        .report-card-content { color: #cbd5e1; font-size: 0.75rem; line-height: 1.6; }
        
        /* INFORME VISUAL */
        .report-visual {
            background: linear-gradient(135deg, #1a1a1f 0%, #27272a 100%);
            border: 2px solid #ff8c00;
            border-radius: 0.75rem;
            padding: 2rem;
            color: #fff;
            line-height: 1.8;
            font-size: 0.85rem;
        }
        .report-visual h2 {
            color: #ff8c00;
            font-size: 1.2rem;
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid #ff8c00;
            padding-bottom: 0.5rem;
            text-transform: uppercase;
        }
        .report-visual h3 {
            color: #10b981;
            font-size: 0.95rem;
            margin-top: 1rem;
            margin-bottom: 0.75rem;
        }
        .report-visual p {
            margin-bottom: 1rem;
            color: #cbd5e1;
        }
        
        .pdf-buttons { display: flex; gap: 1rem; margin-top: 1.5rem; }
        .pdf-buttons .btn { flex: 1; }
    </style>
</head>
<body>
    <div class="cover" id="cover">
        <div class="cover-content">
            <div class="cover-3d-icon">
                <div class="gear">
                    <div class="gear-face">⚙</div>
                    <div class="gear-face">⚙</div>
                    <div class="gear-face">⚙</div>
                    <div class="gear-face">⚙</div>
                    <div class="gear-face">⚙</div>
                    <div class="gear-face">⚙</div>
                </div>
            </div>
            
            <div>
                <p class="cover-subtitle">Protocolo de Diagnóstico Estratégico</p>
                <h1 class="cover-title">SUITE<br>ANÁLISIS</h1>
            </div>
            
            <p class="cover-description">
                Transforma "Tengo un problema" en<br>
                "Estoy viendo cómo se genera este sistema de problemas"
            </p>
            
            <button class="cover-btn" onclick="startApp()">
                → EMPEZAR ANÁLISIS
            </button>
        </div>
    </div>

    <div class="container" id="app" style="display: none;">
        <div class="header">
            <div class="header-icon">⚙</div>
            <div>
                <div class="header-title">SUITE ANÁLISIS</div>
                <div class="header-subtitle">V3.2 - INFORME VISUAL + PDF PROFESIONAL</div>
            </div>
        </div>
        <div class="main-content">
            <div class="sidebar">
                <p class="sidebar-title">━━━ CRONOGRAMA ━━━</p>
                <button class="step-btn active" onclick="goToStep(1)"><span class="step-number">01</span> SELECCIÓN DEL PROBLEMA</button>
                <button class="step-btn inactive" onclick="goToStep(2)"><span class="step-number">02</span> MAPEO DE CAUSAS</button>
                <button class="step-btn inactive" onclick="goToStep(3)"><span class="step-number">03</span> PROFUNDIZACIÓN SISTÉMICA</button>
                <button class="step-btn inactive" onclick="goToStep(4)"><span class="step-number">04</span> ENUNCIADO FORMAL</button>
                <button class="step-btn inactive" onclick="goToStep(5)"><span class="step-number">05</span> DINÁMICAS DE PODER</button>
                <button class="step-btn inactive" onclick="goToStep(6)"><span class="step-number">06</span> LÍMITES DEL CONOCIMIENTO</button>
                <button class="step-btn inactive" onclick="goToStep(7)"><span class="step-number">07</span> APRENDIZAJE DEL SISTEMA</button>
                <button class="step-btn inactive" onclick="goToStep(8)"><span class="step-number">08</span> SÍNTESIS ESTRATÉGICA</button>
            </div>
            <div class="content-area">
                <div class="content-wrapper">
                    <div class="step-header">
                        <div class="step-badge" id="stepBadge">PASO 01</div>
                        <h1 class="step-title" id="stepTitle">SELECCIÓN DEL PROBLEMA</h1>
                        <p class="step-subtitle" id="stepSubtitle"></p>
                        <div class="step-line"></div>
                    </div>
                    <div class="form-container" id="content"></div>
                    <div class="button-group">
                        <button class="btn btn-secondary" onclick="prevStep()" id="btnPrev">← ANTERIOR</button>
                        <button class="btn btn-primary" onclick="nextStep()" id="btnNext">SIGUIENTE →</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentStep = 1;
        
        const data = {
            problemEffect: '',
            environment: '',
            impact: '',
            causes: '',
            whys: ['', '', '', '', ''],
            affectedActor: '',
            stakeholders: '',
            technicalUncertainty: '',
            organizationalUncertainty: '',
            hypotheses: ''
        };

        function startApp() {
            document.getElementById('cover').classList.add('hidden');
            document.getElementById('app').style.display = 'flex';
        }

        function goToStep(step) {
            currentStep = step;
            renderStep();
        }

        function nextStep() {
            if (currentStep < 8 && canAdvance()) {
                currentStep++;
                renderStep();
            }
        }

        function prevStep() {
            if (currentStep > 1) {
                currentStep--;
                renderStep();
            }
        }

        function canAdvance() {
            if (currentStep === 1) {
                return data.problemEffect.trim() && data.environment.trim() && data.impact.trim();
            }
            if (currentStep === 2) {
                return data.causes.trim();
            }
            if (currentStep === 3) {
                return data.whys.every(w => w.trim());
            }
            if (currentStep === 4) {
                return data.affectedActor.trim();
            }
            if (currentStep === 5) {
                return data.stakeholders.trim();
            }
            return true;
        }

        function updateButtonState() {
            document.getElementById('btnNext').disabled = !canAdvance() || currentStep === 8;
        }

        function renderStep() {
            const titles = ['', 'SELECCIÓN DEL PROBLEMA', 'MAPEO DE CAUSAS', 'PROFUNDIZACIÓN SISTÉMICA', 
                           'ENUNCIADO FORMAL DEL PROBLEMA', 'DINÁMICAS DE PODER EN EL SISTEMA', 'LÍMITES DEL CONOCIMIENTO',
                           'APRENDIZAJE DEL SISTEMA', 'SÍNTESIS ESTRATÉGICA'];
            
            const subtitles = ['', 'Definí qué está pasando', 'Las condiciones que sostienen el problema', 
                              'Penetrá la lógica sistémica', 'Cómo el sistema produce el problema', 
                              'Quién optimiza qué y por qué choca', 'Qué no sabemos y por qué importa', 
                              'Diseñá cómo entender el sistema mejor', 'Tu lectura del sistema'];
            
            document.getElementById('stepBadge').textContent = `PASO ${String(currentStep).padStart(2, '0')}`;
            document.getElementById('stepTitle').textContent = titles[currentStep];
            document.getElementById('stepSubtitle').textContent = subtitles[currentStep];
            
            const btnNext = document.getElementById('btnNext');
            const btnPrev = document.getElementById('btnPrev');
            btnNext.disabled = !canAdvance() || currentStep === 8;
            btnPrev.disabled = currentStep === 1;
            
            document.querySelectorAll('.step-btn').forEach((btn, idx) => {
                btn.className = (idx + 1 === currentStep) ? 'step-btn active' : 'step-btn inactive';
            });
            
            let html = '';
            
            if (currentStep === 1) {
                html = `
                    <div style="background: #3f2415; border: 2px solid #ff8c00; border-radius: 0.5rem; padding: 1rem; margin-bottom: 1.5rem; font-size: 0.75rem; color: #fed7aa; line-height: 1.6;">
                        <strong style="color: #ff8c00; display: block; margin-bottom: 0.5rem;">🧠 Pregunta incómoda:</strong>
                        ¿Estás describiendo un síntoma… o cómo funciona realmente el sistema?
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Problema Principal (Efecto)</label>
                        <span class="form-hint">Describí qué está pasando. No expliques por qué aún.</span>
                        <textarea class="form-textarea" rows="3" placeholder="Ej 1: La línea de producción está parando cada 2 horas&#10;Ej 2: Cumplimos, pero cada vez con más esfuerzo" 
                            oninput="data.problemEffect = this.value; updateButtonState();">${data.problemEffect}</textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Contexto / Entorno del Problema</label>
                        <span class="form-hint">¿En qué parte del sistema ocurre?</span>
                        <textarea class="form-textarea" rows="3" placeholder="Ej: Ocurre en la línea 02, turno de 6 a 14 hs" 
                            oninput="data.environment = this.value; updateButtonState();">${data.environment}</textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Impacto (Desgaste del Sistema)</label>
                        <span class="form-hint">¿Qué estás sosteniendo hoy que antes no necesitabas?</span>
                        <textarea class="form-textarea" rows="3" placeholder="Ej: Se pierden 4h de producción/día, costo $2.5k" 
                            oninput="data.impact = this.value; updateButtonState();">${data.impact}</textarea>
                    </div>
                `;
            } else if (currentStep === 2) {
                html = `
                    <div class="form-group">
                        <label class="form-label">Condiciones que Generan el Problema</label>
                        <span class="form-hint">¿Qué está sosteniendo el sistema hoy?</span>
                        <textarea class="form-textarea" rows="8" placeholder="[Demanda]&#10;[Planificación]&#10;[Ejecución]&#10;[Decisiones]" 
                            oninput="data.causes = this.value; updateButtonState();">${data.causes}</textarea>
                    </div>
                `;
            } else if (currentStep === 3) {
                html = `<div style="background: #7c2d12; border: 2px solid #ea580c; border-radius: 0.5rem; padding: 1rem; margin-bottom: 1.5rem; font-size: 0.75rem; color: #fed7aa;">🎯 Profundizá una condición del paso anterior</div>`;
                data.whys.forEach((w, i) => {
                    let levelQuestion = ['¿Por qué?', '¿Qué la hace necesaria?', '¿Qué del sistema lo permite?', '¿Qué diseño hay detrás?', '¿Qué lógica lo sostiene?'][i];
                    html += `
                        <div class="form-group">
                            <label class="form-label">Nivel ${i + 1}: ${levelQuestion}</label>
                            <textarea class="form-textarea" rows="2" placeholder="Respuesta..." 
                                oninput="data.whys[${i}] = this.value; updateButtonState();">${w}</textarea>
                        </div>
                    `;
                });
            } else if (currentStep === 4) {
                html = `
                    <div class="form-group">
                        <label class="form-label">¿Qué parte del sistema se ve más afectada?</label>
                        <textarea class="form-textarea" rows="2" placeholder="Ej: El sistema productivo en su capacidad de absorber variabilidad" 
                            oninput="data.affectedActor = this.value; updateButtonState();">${data.affectedActor}</textarea>
                    </div>
                `;
            } else if (currentStep === 5) {
                html = `
                    <div class="form-group">
                        <label class="form-label">Actores y Tensiones del Sistema</label>
                        <textarea class="form-textarea" rows="8" placeholder="[Actor] → Qué optimiza | Qué evita | Impacto" 
                            oninput="data.stakeholders = this.value; updateButtonState();">${data.stakeholders}</textarea>
                    </div>
                `;
            } else if (currentStep === 6) {
                html = `
                    <div class="form-group">
                        <label class="form-label">Incertidumbre Técnica</label>
                        <textarea class="form-textarea" rows="4" placeholder="¿Qué no sabés medir o explicar del sistema?" 
                            oninput="data.technicalUncertainty = this.value;">${data.technicalUncertainty}</textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Incertidumbre Organizacional</label>
                        <textarea class="form-textarea" rows="4" placeholder="¿Qué decisiones no están claras?" 
                            oninput="data.organizationalUncertainty = this.value;">${data.organizationalUncertainty}</textarea>
                    </div>
                `;
            } else if (currentStep === 7) {
                html = `
                    <div class="form-group">
                        <label class="form-label">Hipótesis de Funcionamiento del Sistema</label>
                        <span class="form-hint">Si [hipótesis], entonces [resultado]. Lo validaría mediante [acción].</span>
                        <textarea class="form-textarea" rows="8" placeholder="Si la variabilidad de demanda es crítica, entonces debería existir un patrón. Lo validaría analizando histórico." 
                            oninput="data.hypotheses = this.value;">${data.hypotheses}</textarea>
                    </div>
                `;
            } else if (currentStep === 8) {
                html = `
                    <div class="report-cards">
                        <div class="report-card">
                            <div class="report-card-title">📊 QUÉ ESTÁ PASANDO</div>
                            <div class="report-card-content">
                                <strong>Efecto:</strong> ${data.problemEffect || '—'}<br><br>
                                <strong>Contexto:</strong> ${data.environment || '—'}<br><br>
                                <strong>Impacto:</strong> ${data.impact || '—'}
                            </div>
                        </div>

                        <div class="report-card">
                            <div class="report-card-title">⚡ CÓMO SE GENERA</div>
                            <div class="report-card-content">
                                <strong>Condiciones:</strong> ${data.causes ? data.causes.substring(0, 100) + '...' : '—'}<br><br>
                                <strong>Lógica:</strong> ${data.whys.filter(w => w).length > 0 ? data.whys.filter(w => w).join(' → ').substring(0, 100) + '...' : '—'}
                            </div>
                        </div>

                        <div class="report-card">
                            <div class="report-card-title">🔗 POR QUÉ SE SOSTIENE</div>
                            <div class="report-card-content">
                                <strong>Sistema:</strong> ${data.affectedActor || '—'}<br><br>
                                <strong>Dinámicas:</strong> ${data.stakeholders ? data.stakeholders.substring(0, 100) + '...' : '—'}
                            </div>
                        </div>

                        <div class="report-card">
                            <div class="report-card-title">❓ INCERTIDUMBRE</div>
                            <div class="report-card-content">
                                <strong>Técnica:</strong> ${data.technicalUncertainty ? data.technicalUncertainty.substring(0, 100) + '...' : '—'}<br><br>
                                <strong>Org:</strong> ${data.organizationalUncertainty ? data.organizationalUncertainty.substring(0, 100) + '...' : '—'}
                            </div>
                        </div>
                    </div>

                    <div class="strategic-reading">
                        <div class="strategic-reading-title">🧠 LECTURA ESTRATÉGICA</div>
                        <div class="strategic-reading-content">
                            El sistema no está fallando por errores operativos aislados, sino porque está operando fuera de su diseño original. La creciente variabilidad está siendo absorbida mediante esfuerzo humano y ajustes reactivos, lo que sostiene la operación en el corto plazo pero deteriora la previsibilidad y eficiencia a mediano plazo.
                        </div>
                    </div>

                    <div class="first-movement">
                        <div class="first-movement-title">🎯 PRIMER MOVIMIENTO RECOMENDADO</div>
                        <div class="first-movement-content">
                            Antes de rediseñar, el foco debe estar en entender y acotar la variabilidad que ingresa al sistema.
                            <strong>Paso inicial:</strong> Introducir un mecanismo simple de clasificación que permita visibilizar la variabilidad real, identificar qué genera mayor fricción, y estabilizar la planificación base.
                        </div>
                    </div>

                    <div class="risk-warning">
                        <div class="risk-warning-title">⚠️ RIESGO DE NO ACTUAR</div>
                        <div class="risk-warning-content">
                            Si no se interviene, el sistema continuará funcionando, pero con creciente dependencia del esfuerzo humano, pérdida de previsibilidad y riesgo de saturación operativa. El "sistema actual" tiene un límite que se acerca.
                        </div>
                    </div>

                    <div class="ai-amplifier-box">
                        <strong>🚀 GENERAR INFORME EJECUTIVO CON IA</strong>
                        <p>Tu síntesis está lista. Convertila en un informe profesional con diseño visual impactante:</p>
                        <div class="pdf-buttons">
                            <button class="btn btn-primary" onclick="generateReport()" style="flex: 1;">
                                → GENERAR INFORME VISUAL + PDF
                            </button>
                        </div>
                    </div>
                `;
            }
            
            document.getElementById('content').innerHTML = html;
        }

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        async function generateReport() {
            const button = event.target;
            button.disabled = true;
            button.textContent = '⏳ Generando informe...';

            try {
                const systemPrompt = `Eres un consultor estratégico senior especializado en análisis de sistemas organizacionales. Tu rol es transformar diagnósticos detallados en informes ejecutivos profundos, actionables y sistémicos.`;

                const userPrompt = `Analiza el siguiente diagnóstico y genera un informe ejecutivo profesional, estructurado y accionable.

DATOS DEL ANÁLISIS:
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

QUÉ ESTÁ PASANDO:
Problema: ${data.problemEffect || 'No especificado'}
Contexto: ${data.environment || 'No especificado'}
Impacto: ${data.impact || 'No especificado'}

CÓMO SE GENERA:
Condiciones: ${data.causes || 'No especificado'}
Lógica: ${data.whys.filter(w => w).join(' → ') || 'No especificado'}

POR QUÉ SE SOSTIENE:
Sistema afectado: ${data.affectedActor || 'No especificado'}
Dinámicas: ${data.stakeholders || 'No especificado'}

INCERTIDUMBRE:
Técnica: ${data.technicalUncertainty || 'No especificado'}
Organizacional: ${data.organizationalUncertainty || 'No especificado'}

HIPÓTESIS:
${data.hypotheses || 'No especificado'}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

Genera un informe que incluya:

1. SÍNTESIS EJECUTIVA (3-4 párrafos). Resumen ejecutivo de alto nivel.
2. ANÁLISIS ESTRUCTURAL. Cómo el sistema genera el problema (es lógica, no culpa).
3. DINÁMICAS DE PODER. Qué actor optimiza qué y por qué choca.
4. INCERTIDUMBRES CRÍTICAS. Qué necesita entenderse antes de intervenir.
5. RUTA DE APRENDIZAJE. Qué hipótesis validar y en qué orden.
6. RECOMENDACIONES INICIALES. Experimentos, no soluciones inmediatas.

Tono: profesional, sin jargon, directo, accionable.`;

                const response = await fetch('/.netlify/functions/generateReport', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        systemPrompt,
                        userPrompt
                    })
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || 'Error en la solicitud');
                }

                const reportText = result.content;
                showReportVisual(reportText);
                
            } catch (error) {
                button.disabled = false;
                button.textContent = '✗ Reintenta';
                alert('Error: ' + error.message);
                console.error('Error:', error);
            }
        }

        function showReportVisual(reportText) {
            const contentArea = document.querySelector('.content-wrapper');
            
            const formattedText = reportText.split('\n\n').map(section => {
                let sectionHtml = section;
                if (section.includes('SÍNTESIS EJECUTIVA')) {
                    return `<h2>📋 SÍNTESIS EJECUTIVA</h2><p>${section.replace('SÍNTESIS EJECUTIVA', '').trim()}</p>`;
                } else if (section.includes('ANÁLISIS ESTRUCTURAL')) {
                    return `<h2>🔍 ANÁLISIS ESTRUCTURAL</h2><p>${section.replace('ANÁLISIS ESTRUCTURAL', '').trim()}</p>`;
                } else if (section.includes('DINÁMICAS DE PODER')) {
                    return `<h2>⚡ DINÁMICAS DE PODER</h2><p>${section.replace('DINÁMICAS DE PODER', '').trim()}</p>`;
                } else if (section.includes('INCERTIDUMBRES')) {
                    return `<h2>❓ INCERTIDUMBRES CRÍTICAS</h2><p>${section.replace(/INCERTIDUMBRES.*$/i, '').trim()}</p>`;
                } else if (section.includes('RUTA DE APRENDIZAJE')) {
                    return `<h2>🧠 RUTA DE APRENDIZAJE</h2><p>${section.replace('RUTA DE APRENDIZAJE', '').trim()}</p>`;
                } else if (section.includes('RECOMENDACIONES')) {
                    return `<h2>🎯 RECOMENDACIONES INICIALES</h2><p>${section.replace('RECOMENDACIONES INICIALES', '').trim()}</p>`;
                }
                return `<p>${escapeHtml(section.trim())}</p>`;
            }).join('');

            const html = `
                <div class="report-visual">
                    ${formattedText}
                </div>
                <div class="pdf-buttons">
                    <button class="btn btn-primary" onclick="downloadReportPDF()" style="flex: 1;">
                        ↓ DESCARGAR COMO PDF
                    </button>
                    <button class="btn btn-secondary" onclick="location.reload()" style="flex: 1;">
                        ← VOLVER
                    </button>
                </div>
            `;

            const stepHeader = contentArea.querySelector('.step-header');
            const formContainer = contentArea.querySelector('.form-container');
            const buttonGroup = contentArea.querySelector('.button-group');

            formContainer.innerHTML = html;
            buttonGroup.style.display = 'none';

            // Guardar el contenido para descargar
            window.lastReportContent = document.querySelector('.report-visual').innerText;
        }

        function downloadReportPDF() {
            const reportContent = document.querySelector('.report-visual');
            const opt = {
                margin: 15,
                filename: 'informe-diagnostico.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
            };

            html2pdf().set(opt).from(reportContent).save();
        }

        renderStep();
    </script>
</body>
</html>
