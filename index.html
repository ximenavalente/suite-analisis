<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suite de Análisis Industrial</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div id="app"></div>
    <script>
        let currentStep = 1;
        const data = {
            problemEffect: '', environment: '', impact: '', causes: '', whys: ['', '', '', '', ''],
            affectedActor: '', stakeholders: '', technicalUncertainty: '', organizationalUncertainty: '', hypotheses: ''
        };

        async function generateReport() {
            const button = event.target;
            button.disabled = true;
            button.textContent = '⏳ Generando...';

            try {
                const userPrompt = `Analiza este diagnóstico y genera un informe ejecutivo profesional con 6 secciones:

DATOS:
Problema: ${data.problemEffect}
Contexto: ${data.environment}
Impacto: ${data.impact}

Genera 6 secciones: SÍNTESIS EJECUTIVA, ANÁLISIS ESTRUCTURAL, DINÁMICAS DE PODER, INCERTIDUMBRES CRÍTICAS, RUTA DE APRENDIZAJE, RECOMENDACIONES.`;

                const response = await fetch('/.netlify/functions/generateReport', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ systemPrompt: 'Eres un consultor estratégico', userPrompt })
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || 'Error');
                }

                showReport(result.content);
                
            } catch (error) {
                button.disabled = false;
                button.textContent = '✗ Error';
                alert('Error: ' + error.message);
            }
        }

        function showReport(text) {
            alert('Informe generado:\n\n' + text.substring(0, 200) + '...');
        }

        document.getElementById('app').innerHTML = '<button onclick="generateReport()">Generar Informe</button>';
    </script>
</body>
</html>
