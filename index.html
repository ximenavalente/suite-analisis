<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suite de Análisis Industrial</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; }
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; }
        .cover { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #000 0%, #0a0a0a 50%, #000 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.8s ease, visibility 0.8s ease; }
        .cover.hidden { opacity: 0; visibility: hidden; }
        .cover-content { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 2rem; }
        .cover-3d-icon { width: 200px; height: 200px; perspective: 1000px; margin: 0 auto; }
        .gear { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; animation: rotateCube 8s infinite linear; }
        .gear-face { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; border: 3px solid #ff8c00; font-size: 80px; font-weight: 900; transform-style: preserve-3d; background: linear-gradient(135deg, #1a1a1a 0%, #000 100%); box-shadow: inset 0 0 30px rgba(255, 140, 0, 0.3), 0 0 30px rgba(255, 140, 0, 0.5); }
        .gear-face:nth-child(1) { transform: translateZ(100px); }
        .gear-face:nth-child(2) { transform: rotateY(180deg) translateZ(100px); }
        .gear-face:nth-child(3) { transform: rotateY(90deg) translateZ(100px); }
        .gear-face:nth-child(4) { transform: rotateY(-90deg) translateZ(100px); }
        .gear-face:nth-child(5) { transform: rotateX(90deg) translateZ(100px); }
        .gear-face:nth-child(6) { transform: rotateX(-90deg) translateZ(100px); }
        @keyframes rotateCube { 0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); } 100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg); } }
        .cover-title { font-size: 3.5rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.15em; color: #fff; text-shadow: 0 0 30px rgba(255, 140, 0, 0.5); line-height: 1.1; margin: 1rem 0; }
        .cover-subtitle { font-size: 1rem; color: #ff8c00; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1rem; }
        .cover-description { font-size: 0.9rem; color: #a1a1aa; max-width: 500px; line-height: 1.6; margin-bottom: 2rem; }
        .cover-btn { background: linear-gradient(135deg, #ff8c00 0%, #ff7f00 100%); color: #000; padding: 1rem 3rem; font-size: 1rem; font-weight: bold; text-transform: uppercase; letter-spacing: 0.1em; border: 2px solid #ff8c00; border-radius: 0.5rem; cursor: pointer; transition: all 0.3s ease; font-family: 'Courier New', monospace; box-shadow: 0 0 20px rgba(255, 140, 0, 0.3); }
        .cover-btn:hover { background: linear-gradient(135deg, #ff7f00 0%, #ff8c00 100%); box-shadow: 0 0 40px rgba(255, 140, 0, 0.6); transform: scale(1.05); }
        .container { display: flex; height: 100vh; width: 100vw; flex-direction: column; }
        .header { position: sticky; top: 0; z-index: 50; background: linear-gradient(to right, #000, #18181b, #000); border-bottom: 4px solid #ff8c00; padding: 1rem; display: flex; align-items: center; gap: 1rem; }
        .header-icon { width: 3rem; height: 3rem; background: linear-gradient(135deg, #ff8c00, #ff7f00); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.125rem; border: 2px solid #ff8c00; }
        .header-title { font-weight: 900; font-size: 1.25rem; text-transform: uppercase; letter-spacing: 0.1em; }
        .header-subtitle { font-size: 0.75rem; color: #ff8c00; }
        .main-content { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 20rem; background: linear-gradient(to bottom, #09090b, #000); border-right: 2px solid #ff8c00; padding: 1rem; overflow-y: auto; }
        .sidebar-title { font-size: 0.75rem; color: #ff8c00; text-transform: uppercase; font-weight: bold; letter-spacing: 0.1em; margin-bottom: 1.5rem; }
        .step-btn { width: 100%; padding: 0.75rem; border-radius: 0.375rem; text-align: left; transition: all 0.2s; font-size: 0.75rem; font-family: 'Courier New', monospace; border: 2px solid; margin-bottom: 0.5rem; cursor: pointer; background: transparent; color: inherit; }
        .step-btn.active { background: #ff8c00; color: #000; border-color: #ff8c00; }
        .step-btn.inactive { color: #a1a1aa; border-color: #27272a; }
        .step-btn.inactive:hover { border-color: #ff8c00; }
        .step-number { color: #ff8c00; }
        .content-area { flex: 1; padding: 2rem; background: #000; overflow-y: auto; }
        .content-wrapper { max-width: 80rem; }
        .step-header { margin-bottom: 2.5rem; padding-bottom: 2rem; border-bottom: 2px solid #ff8c00; }
        .step-badge { background: #ff8c00; color: #000; padding: 0.5rem 1rem; border-radius: 0.375rem; font-weight: bold; font-size: 0.75rem; letter-spacing: 0.1em; margin-bottom: 1rem; display: inline-block; }
        .step-title { font-size: 2.25rem; font-weight: 900; text-transform: uppercase; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
        .step-subtitle { font-size: 0.875rem; color: #ff8c00; margin-bottom: 1.5rem; font-style: italic; }
        .step-line { height: 0.5rem; background: linear-gradient(to right, #ff8c00, #ff7f00); width: 8rem; margin-bottom: 1rem; }
        .form-container { background: #18181b; border: 2px solid #27272a; border-radius: 0.5rem; padding: 2rem; margin-bottom: 2.5rem; }
        .form-group { margin-bottom: 2rem; }
        .form-label { display: block; font-size: 0.875rem; font-weight: bold; color: #ff8c00; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.1em; }
        .form-hint { display: block; font-size: 0.7rem; color: #a1a1aa; margin-bottom: 0.75rem; font-style: italic; }
        .form-textarea { width: 100%; padding: 1rem; background: #27272a; border: 2px solid #3f3f46; border-radius: 0.375rem; color: #fff; font-family: 'Courier New', monospace; font-size: 0.875rem; resize: vertical; }
        .form-textarea:focus { outline: none; border-color: #ff8c00; }
        .button-group { display: flex; justify-content: space-between; gap: 1rem; }
        .btn { padding: 0.75rem 1.5rem; border-radius: 0.375rem; font-weight: bold; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.75rem; cursor: pointer; border: 2px solid; transition: all 0.2s; font-family: 'Courier New', monospace; }
        .btn-primary { background: #ff8c00; color: #000; border-color: #ff8c00; }
        .btn-primary:hover:not(:disabled) { background: #ff7f00; border-color: #ff7f00; }
        .btn-secondary { border-color: #3f3f46; color: #a1a1aa; }
        .btn-secondary:hover:not(:disabled) { border-color: #ff8c00; color: #ff8c00; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .ai-amplifier-box { background: linear-gradient(135deg, #1a3a2a 0%, #0f2818 100%); border: 2px solid #059669; border-radius: 0.5rem; padding: 1.5rem; margin-top: 2rem; }
        .ai-amplifier-box strong { color: #10b981; display: block; margin-bottom: 0.75rem; }
        .pdf-buttons { display: flex; gap: 1rem; margin-top: 1.5rem; }
        .pdf-buttons .btn { flex: 1; }
        .report-visual { background: linear-gradient(135deg, #1a1a1f 0%, #27272a 100%); border: 2px solid #ff8c00; border-radius: 0.75rem; padding: 2rem; color: #fff; line-height: 1.8; font-size: 0.9rem; }
        .report-visual h2 { color: #ff8c00; font-size: 1.2rem; margin-top: 1.5rem; margin-bottom: 1rem; border-bottom: 2px solid #ff8c00; padding-bottom: 0.5rem; text-transform: uppercase; }
        .report-visual p { margin-bottom: 1rem; color: #cbd5e1; }
        .report-visual strong { color: #10b981; }
        .report-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
        .report-card { background: linear-gradient(135deg, #1a1a1f 0%, #27272a 100%); border: 2px solid #ff8c00; border-radius: 0.75rem; padding: 1.5rem; }
        .report-card:hover { box-shadow: 0 20px 40px rgba(255,140,0,0.3); }
        .report-card-title { color: #ff8c00; font-weight: bold; font-size: 0.9rem; margin-bottom: 1rem; text-transform: uppercase; }
        .report-card-content { color: #cbd5e1; font-size: 0.75rem; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="cover" id="cover">
        <div class="cover-content">
            <div class="cover-3d-icon">
                <div class="gear">
                    <div class="gear-face">⚙</div><div class="gear-face">⚙</div><div class="gear-face">⚙</div>
                    <div class="gear-face">⚙</div><div class="gear-face">⚙</div><div class="gear-face">⚙</div>
                </div>
            </div>
            <div>
                <p class="cover-subtitle">Protocolo de Diagnóstico Estratégico</p>
                <h1 class="cover-title">SUITE ANÁLISIS</h1>
            </div>
            <p class="cover-description">Transforma "Tengo un problema" en "Estoy viendo cómo se genera este sistema de problemas"</p>
            <button class="cover-btn" onclick="startApp()">→ EMPEZAR ANÁLISIS</button>
        </div>
    </div>

    <div class="container" id="app" style="display: none;">
        <div class="header">
            <div class="header-icon">⚙</div>
            <div>
                <div class="header-title">SUITE ANÁLISIS</div>
                <div class="header-subtitle">V3.5 - FUNCIONANDO</div>
            </div>
        </div>
        <div class="main-content">
            <div class="sidebar">
                <p class="sidebar-title">━━━ CRONOGRAMA ━━━</p>
                <button class="step-btn active" onclick="goToStep(1)"><span class="step-number">01</span> SELECCIÓN</button>
                <button class="step-btn inactive" onclick="goToStep(2)"><span class="step-number">02</span> MAPEO</button>
                <button class="step-btn inactive" onclick="goToStep(3)"><span class="step-number">03</span> PROFUNDIDAD</button>
                <button class="step-btn inactive" onclick="goToStep(4)"><span class="step-number">04</span> ENUNCIADO</button>
                <button class="step-btn inactive" onclick="goToStep(5)"><span class="step-number">05</span> DINÁMICAS</button>
                <button class="step-btn inactive" onclick="goToStep(6)"><span class="step-number">06</span> LÍMITES</button>
                <button class="step-btn inactive" onclick="goToStep(7)"><span class="step-number">07</span> APRENDIZAJE</button>
                <button class="step-btn inactive" onclick="goToStep(8)"><span class="step-number">08</span> SÍNTESIS</button>
            </div>
            <div class="content-area">
                <div class="content-wrapper">
                    <div class="step-header">
                        <div class="step-badge" id="stepBadge">PASO 01</div>
                        <h1 class="step-title" id="stepTitle">SELECCIÓN</h1>
                        <p class="step-subtitle" id="stepSubtitle"></p>
                        <div class="step-line"></div>
                    </div>
                    <div class="form-container" id="content"></div>
                    <div class="button-group">
                        <button class="btn btn-secondary" onclick="prevStep()" id="btnPrev">← ANTERIOR</button>
                        <button class="btn btn-primary" onclick="nextStep()" id="btnNext">SIGUIENTE →</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const OPENAI_API_KEY = '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';
        
        let currentStep = 1;
        const data = {
            problemEffect: '', environment: '', impact: '', causes: '', whys: ['', '', '', '', ''],
            affectedActor: '', stakeholders: '', technicalUncertainty: '', organizationalUncertainty: '', hypotheses: ''
        };

        function startApp() {
            document.getElementById('cover').classList.add('hidden');
            document.getElementById('app').style.display = 'flex';
        }

        function goToStep(step) { currentStep = step; renderStep(); }
        function nextStep() { if (currentStep < 8 && canAdvance()) { currentStep++; renderStep(); } }
        function prevStep() { if (currentStep > 1) { currentStep--; renderStep(); } }

        function canAdvance() {
            if (currentStep === 1) return data.problemEffect.trim() && data.environment.trim() && data.impact.trim();
            if (currentStep === 2) return data.causes.trim();
            if (currentStep === 3) return data.whys.every(w => w.trim());
            if (currentStep === 4) return data.affectedActor.trim();
            if (currentStep === 5) return data.stakeholders.trim();
            return true;
        }

        function updateButtonState() {
            document.getElementById('btnNext').disabled = !canAdvance() || currentStep === 8;
        }

        function renderStep() {
            const titles = ['', 'SELECCIÓN DEL PROBLEMA', 'MAPEO DE CAUSAS', 'PROFUNDIZACIÓN SISTÉMICA', 
                           'ENUNCIADO FORMAL DEL PROBLEMA', 'DINÁMICAS DE PODER EN EL SISTEMA', 'LÍMITES DEL CONOCIMIENTO',
                           'APRENDIZAJE DEL SISTEMA', 'SÍNTESIS ESTRATÉGICA'];
            const subtitles = ['', 'Definí qué está pasando', 'Las condiciones que sostienen el problema', 
                              'Penetrá la lógica sistémica', 'Cómo el sistema produce el problema', 
                              'Quién optimiza qué y por qué choca', 'Qué no sabemos y por qué importa', 
                              'Diseñá cómo entender el sistema mejor', 'Tu lectura del sistema'];
            
            document.getElementById('stepBadge').textContent = `PASO ${String(currentStep).padStart(2, '0')}`;
            document.getElementById('stepTitle').textContent = titles[currentStep];
            document.getElementById('stepSubtitle').textContent = subtitles[currentStep];
            
            const btnNext = document.getElementById('btnNext');
            const btnPrev = document.getElementById('btnPrev');
            btnNext.disabled = !canAdvance() || currentStep === 8;
            btnPrev.disabled = currentStep === 1;
            
            document.querySelectorAll('.step-btn').forEach((btn, idx) => {
                btn.className = (idx + 1 === currentStep) ? 'step-btn active' : 'step-btn inactive';
            });
            
            let html = '';
            
            if (currentStep === 1) {
                html = `
                    <div style="background: #3f2415; border: 2px solid #ff8c00; border-radius: 0.5rem; padding: 1rem; margin-bottom: 1.5rem; font-size: 0.75rem; color: #fed7aa; line-height: 1.6;">
                        <strong style="color: #ff8c00; display: block; margin-bottom: 0.5rem;">🧠 Pregunta incómoda:</strong>
                        ¿Estás describiendo un síntoma… o cómo funciona realmente el sistema?
                    </div>
                    <div class="form-group"><label class="form-label">Problema Principal (Efecto)</label><span class="form-hint">Describí qué está pasando.</span><textarea class="form-textarea" rows="3" placeholder="Ej: La línea de producción está parando cada 2 horas" oninput="data.problemEffect = this.value; updateButtonState();">${data.problemEffect}</textarea></div>
                    <div class="form-group"><label class="form-label">Contexto / Entorno del Problema</label><span class="form-hint">¿En qué parte del sistema ocurre?</span><textarea class="form-textarea" rows="3" placeholder="Ej: Ocurre en la línea 02, turno de 6 a 14 hs" oninput="data.environment = this.value; updateButtonState();">${data.environment}</textarea></div>
                    <div class="form-group"><label class="form-label">Impacto (Desgaste del Sistema)</label><span class="form-hint">¿Qué estás sosteniendo hoy que antes no necesitabas?</span><textarea class="form-textarea" rows="3" placeholder="Ej: Se pierden 4h de producción/día" oninput="data.impact = this.value; updateButtonState();">${data.impact}</textarea></div>
                `;
            } else if (currentStep === 2) {
                html = `<div class="form-group"><label class="form-label">Condiciones que Generan el Problema</label><span class="form-hint">¿Qué está sosteniendo el sistema hoy?</span><textarea class="form-textarea" rows="8" placeholder="[Demanda]&#10;[Planificación]&#10;[Ejecución]" oninput="data.causes = this.value; updateButtonState();">${data.causes}</textarea></div>`;
            } else if (currentStep === 3) {
                html = `<div style="background: #7c2d12; border: 2px solid #ea580c; border-radius: 0.5rem; padding: 1rem; margin-bottom: 1.5rem; font-size: 0.75rem; color: #fed7aa;">🎯 Profundizá una condición</div>`;
                data.whys.forEach((w, i) => {
                    let levelQuestion = ['¿Por qué?', '¿Qué la hace necesaria?', '¿Qué del sistema lo permite?', '¿Qué diseño hay detrás?', '¿Qué lógica lo sostiene?'][i];
                    html += `<div class="form-group"><label class="form-label">Nivel ${i + 1}: ${levelQuestion}</label><textarea class="form-textarea" rows="2" placeholder="Respuesta..." oninput="data.whys[${i}] = this.value; updateButtonState();">${w}</textarea></div>`;
                });
            } else if (currentStep === 4) {
                html = `<div class="form-group"><label class="form-label">¿Qué parte del sistema se ve más afectada?</label><textarea class="form-textarea" rows="2" placeholder="Ej: El sistema productivo" oninput="data.affectedActor = this.value; updateButtonState();">${data.affectedActor}</textarea></div>`;
            } else if (currentStep === 5) {
                html = `<div class="form-group"><label class="form-label">Actores y Tensiones del Sistema</label><textarea class="form-textarea" rows="8" placeholder="[Actor] → Qué optimiza | Qué evita" oninput="data.stakeholders = this.value; updateButtonState();">${data.stakeholders}</textarea></div>`;
            } else if (currentStep === 6) {
                html = `<div class="form-group"><label class="form-label">Incertidumbre Técnica</label><textarea class="form-textarea" rows="3" placeholder="¿Qué no sabés?" oninput="data.technicalUncertainty = this.value;">${data.technicalUncertainty}</textarea></div><div class="form-group"><label class="form-label">Incertidumbre Organizacional</label><textarea class="form-textarea" rows="3" placeholder="¿Qué decisiones no están claras?" oninput="data.organizationalUncertainty = this.value;">${data.organizationalUncertainty}</textarea></div>`;
            } else if (currentStep === 7) {
                html = `<div class="form-group"><label class="form-label">Hipótesis de Funcionamiento</label><textarea class="form-textarea" rows="6" placeholder="Si [hipótesis], entonces [resultado]" oninput="data.hypotheses = this.value;">${data.hypotheses}</textarea></div>`;
            } else if (currentStep === 8) {
                html = `
                    <div class="report-cards">
                        <div class="report-card">
                            <div class="report-card-title">📊 QUÉ ESTÁ PASANDO</div>
                            <div class="report-card-content">
                                <strong>Efecto:</strong> ${data.problemEffect || '—'}<br><strong>Contexto:</strong> ${data.environment || '—'}<br><strong>Impacto:</strong> ${data.impact || '—'}
                            </div>
                        </div>
                        <div class="report-card">
                            <div class="report-card-title">⚡ CÓMO SE GENERA</div>
                            <div class="report-card-content">
                                <strong>Condiciones:</strong> ${data.causes ? data.causes.substring(0, 80) + '...' : '—'}<br><strong>Lógica:</strong> ${data.whys.filter(w => w).length} niveles
                            </div>
                        </div>
                        <div class="report-card">
                            <div class="report-card-title">🔗 POR QUÉ SE SOSTIENE</div>
                            <div class="report-card-content">
                                <strong>Sistema:</strong> ${data.affectedActor || '—'}<br><strong>Dinámicas:</strong> ${data.stakeholders ? 'Configuradas' : '—'}
                            </div>
                        </div>
                        <div class="report-card">
                            <div class="report-card-title">❓ INCERTIDUMBRE</div>
                            <div class="report-card-content">
                                <strong>Técnica:</strong> ${data.technicalUncertainty ? 'Identificada' : '—'}<br><strong>Org:</strong> ${data.organizationalUncertainty ? 'Identificada' : '—'}
                            </div>
                        </div>
                    </div>
                    <div class="ai-amplifier-box">
                        <strong>🚀 GENERAR INFORME EJECUTIVO CON IA</strong>
                        <p>Convertí tu análisis en un informe estratégico profesional:</p>
                        <div class="pdf-buttons">
                            <button class="btn btn-primary" onclick="generateReport()" style="flex: 1;">→ GENERAR INFORME + PDF</button>
                        </div>
                    </div>
                `;
            }
            
            document.getElementById('content').innerHTML = html;
        }

        async function generateReport() {
            const button = event.target;
            button.disabled = true;
            button.textContent = '⏳ Generando...';

            try {
                const userPrompt = `Analiza este diagnóstico y genera un informe ejecutivo profesional con 6 secciones:

DATOS:
Problema: ${data.problemEffect}
Contexto: ${data.environment}
Impacto: ${data.impact}
Causas: ${data.causes}
Dinámicas: ${data.stakeholders}
Hipótesis: ${data.hypotheses}

SECCIONES REQUERIDAS:
1. SÍNTESIS EJECUTIVA (2-3 párrafos)
2. ANÁLISIS ESTRUCTURAL (cómo el sistema genera el problema)
3. DINÁMICAS DE PODER (qué actor optimiza qué)
4. INCERTIDUMBRES CRÍTICAS (qué necesita entenderse)
5. RUTA DE APRENDIZAJE (qué hipótesis validar)
6. RECOMENDACIONES INICIALES (experimentos, no soluciones)

Tono: profesional, directo, accionable.`;

                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${OPENAI_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'gpt-4-turbo',
                        messages: [
                            { role: 'user', content: userPrompt }
                        ],
                        max_tokens: 2000,
                        temperature: 0.7
                    })
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error?.message || 'Error en OpenAI');
                }

                const reportText = result.choices[0].message.content;
                showReportVisual(reportText);
                
            } catch (error) {
                button.disabled = false;
                button.textContent = '✗ Error - Reintenta';
                alert('Error: ' + error.message);
            }
        }

        function showReportVisual(reportText) {
            const contentArea = document.querySelector('.content-wrapper');
            const formContainer = contentArea.querySelector('.form-container');
            const buttonGroup = contentArea.querySelector('.button-group');

            const formattedText = reportText.split('\n\n').map(p => `<p>${p.trim()}</p>`).join('');

            formContainer.innerHTML = `<div class="report-visual">${formattedText}</div><div class="pdf-buttons"><button class="btn btn-primary" onclick="downloadPDF()" style="flex: 1;">↓ DESCARGAR PDF</button><button class="btn btn-secondary" onclick="location.reload()" style="flex: 1;">← VOLVER</button></div>`;
            buttonGroup.style.display = 'none';
        }

        function downloadPDF() {
            const reportContent = document.querySelector('.report-visual');
            const opt = {
                margin: [15, 15, 15, 15],
                filename: 'informe-diagnostico.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
            };
            html2pdf().set(opt).from(reportContent).save();
        }

        renderStep();
    </script>
</body>
</html>
